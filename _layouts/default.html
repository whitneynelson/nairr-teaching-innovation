<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <img class="logo" src="{{ '/assets/images/cbpc-logo.png' | relative_url }}" alt="Center for Broadening Participation logo">
    <div>
      <div class="site-title">{{ site.title }}</div>
      <div class="site-subtitle">{{ site.description }}</div>
    </div>
  </header>

  {% include nav.html %}

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    NAIRR Teaching Innovation Accelerator &middot; Center for Broadening Participation
  </footer>
</body>
</html>
